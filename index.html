<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="パタパタ時計">
<link rel="apple-touch-icon" href="https://via.placeholder.com/180">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght=500&display=swap" rel="stylesheet">
<style>

:root {
  /* 数字の色（白） */
  --clock-txt-color: #FFF;

  /* 背景の角丸四角の塗り色 */
  --clock-wraper-bg: rgba(30, 30, 30, 0.85);

  --blend-layer: none;
  --clock-wraper-img: none;

  /* 全体のサイズ調整 */
  --clock-size: 1.0;

  /* 全体の大きさ */
  --total-scale: 1.20;
  
  /* 位置調整（通常時 / 横向き） */
  --move-x: 0px;
  --move-y: 25px;
  
  /* ───【追加】縦向きのときの回転設定 ─── */
  --orientation-rotate: 0deg;
}

/* iPhone/スマホが縦向き（画面の高さが幅より長い）のときだけ適用する設定 */
@media (orientation: portrait) {
  :root {
    --orientation-rotate: 90deg; /* 画面を90度回転 */
    
    /* 縦回転するとXとYの軸が入れ替わるため、位置調整の方向を自動補正します */
    --total-scale: 1.60;
    --move-x: +25px; /* 元の --move-y (25px) 分、回転後に下へ下げるための調整 */
    --move-y: 0px;
  }
  
  /* 縦向き時は基準となる仮想画面の縦横比を逆転させてフィットさせます */
  .screen-container {
    width: 100vh !important;
    height: 74.25vh !important;
    max-height: 100vw !important;
    max-width: 177.78vw !important;
  }
}

#blend-layer{
    display: var(--blend-layer);
    z-index: 100;
    position: absolute;
    width: 100%;
    height: 100%;
    background-color: var(--clock-wraper-bg);
    mix-blend-mode: color-dodge;
    opacity: 0.54;
}
    
html,body,div,p,span,time{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}

/* 背景を黒にし、16:9画面の上下左右中央に配置する設定 */
body {
    background-color: #000000;
    font-family: 'Oswald', sans-serif;
    text-align: center;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* 16:9の画面いっぱいに広がるコンテナ */
.screen-container {
    width: 100vw;
    height: 74.25vw; /* 16:9 の比率を維持 */
    max-height: 100vh;
    max-width: 177.78vh; 
    display: flex;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
}

/* 時計と天気エリアを縦に並べるコンテナ */
.main-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 96%; 
    gap: 3vw;   /* 1本化に伴い、バランスを取るため少し広げました */
    
    /* ───【修正】縦向き時の回転（rotate）を追加しました ─── */
    transform: rotate(var(--orientation-rotate)) translate(var(--move-x), var(--move-y)) scale(var(--total-scale));
    transform-origin: center center;
}

/* 時計全体のラップ */
.timewrap{
    position: relative;
    display: inline-flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    width: auto;
    height: 14vw; 
    background-color: var(--clock-wraper-bg);
    background-image: var(--clock-wraper-img);
    border-radius: 1.5vw;
    padding: 0 1.5vw;
    overflow: hidden;
    zoom: var(--clock-size);
    box-shadow: 0 0 20px rgba(255,255,255,0.05);
}

/* 天気ウィジェットを配置するコンテナ */
.weather-row-container {
    display: flex;
    flex-direction: row; 
    justify-content: center;
    align-items: center; 
    width: 100%;
}

/* 【修正】週間予報ウィジェットが横いっぱいに綺麗に広がるように幅を調整 */
.widget-left {
    width: 90vw;        
    max-width: 600px;   /* 大きな画面で見たときに広がりすぎないストッパー */
    display: flex;
    justify-content: center;
    align-items: center; 
  /* ─── ここを追加 ─── */
    transform: scale(0.65);       /* 全体を85%の大きさに縮小 */
    transform-origin: center top; /* 上部中央を基準に縮小（上下の余白を綺麗に保つため） */
}

.separator{
    width: 2.5vw;
    flex-shrink: 0;
}
.separator.short{
    width: 0.6vw;
    flex-shrink: 0;
}

.clock_wrap{
    box-sizing: border-box;
    position: relative;
    width: 8vw;
    height: 11vw;
    background-color: #090909;
    border: 0.6vw solid #222;
    border-radius: 1.2vw;
    margin: 0 0.2vw;
    perspective: 400px;
    flex-shrink: 0;
}

.clock_wrap.double-digit{
    width: 13vw;
    text-indent: 0.5vw;
    letter-spacing: 0.5vw;
}

.clock_wrap > div{
    position: absolute;
    width: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8.5vw;
    line-height: 0;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.9);
    transition: background-color .21s ease-out;
}

.clock_wrap > div > span{
    color: var(--clock-txt-color);
    display: block;
}

.clock_wrap::after,
.clock_wrap::before{
    content: '';
    position: absolute;
    z-index: 5;
    width: 0.3vw;
    height: 1.8vw;
    top: calc(50% - 0.9vw);
    background-color: #888;
}
.clock_wrap::after{
    left: -0.3vw;
}
.clock_wrap::before{
    right: -0.3vw;
}

.top{
    border-top-left-radius: 0.8vw;
    border-top-right-radius: 0.8vw;
    transform-origin: center bottom;
}
.bottom{
    border-bottom-left-radius: 0.8vw;
    border-bottom-right-radius: 0.8vw;
    transform-origin: center top;
}

.top.over{
    background-image: linear-gradient(to bottom, #3a3a3a 0%, #484848 100%);
    color: #FFF;
    height: calc(50% - 1px);
    bottom: calc(50% + 1px);
    z-index: 3;
}
.top.under{
    background-image: linear-gradient(to bottom, #1c1c1c 0%, #252525 100%);
    color: #FFF;
    height: calc(50% - 1px);
    bottom: calc(50% + 1px);
    z-index: 2;
}
.bottom.over{
    background-image: linear-gradient(to bottom, #484848 0%, #353535 100%);
    color: #FFF;
    height: calc(50% - 1px); /* 高さが0になっても外枠が潰れないようベース高さを固定 */
    top: calc(50% + 1px);
    z-index: 5;
}
.bottom.under{
    background-image: linear-gradient(to bottom, #484848 0%, #353535 100%);
    color: #FFF;
    height: calc(50% - 1px);
    top: calc(50% + 1px);
    z-index: 4;
}
.bottom.shadow{
    transition-delay: 0.23s;
    background-color: rgb(20, 20, 20);
}
.top span{
    transform: translateY(2.2vw);    
}
.bottom span{
    transform: translateY(-2.9vw);    
}

@keyframes motionTop{
    0%{
        transform: rotateX(0deg);
        filter: brightness(1);
    }
    50% {
        filter: brightness(0.4);
    }
    100%{
        transform: rotateX(-90deg);
        filter: brightness(0);
    }
}
.motion_top{
    animation: motionTop .24s ease-in;
    animation-fill-mode: both;
}

@keyframes motionBottom{
    0%{
        transform: rotateX(90deg);
        filter: brightness(0);
    }
    40% {
        filter: brightness(0.3);
    }
    100%{
        transform: rotateX(0deg);
        filter: brightness(1);
    }
}
.motion_bottom{
    animation: motionBottom .24s ease-out .23s;
    animation-fill-mode: both;
}

@keyframes shadowFade{
    0% { background-color: rgba(0, 0, 0, 0.8); }
    70% { background-color: rgba(0, 0, 0, 0.8); }
    100% { background-color: rgba(0, 0, 0, 0); }
}
.bottom.shadow{
    transition: none;
    animation: shadowFade .47s linear both;
}

.date_wrap{
    display: inline-flex;
    flex-direction: column;
    justify-content: space-between;
    height: 100%;
    padding: 1.5vw 0;
    flex-shrink: 0;
}
.date_wrap .clock_wrap{
    width: 10vw;
    height: 5.2vw;
    border-radius: 1vw;
    border-width: 0.5vw;
}

.date_wrap .clock_wrap::after,
.date_wrap .clock_wrap::before{
    width: 0.3vw;
    height: 1.2vw;
    top: calc(50% - 0.6vw);
}
.date_wrap .clock_wrap::after{
    left: -0.4vw;
}
.date_wrap .clock_wrap::before{
    right: -0.4vw;
}

.date_wrap .clock_wrap .top{
    border-top-left-radius: 0.6vw;
    border-top-right-radius: 0.6vw;
}
.date_wrap .clock_wrap .bottom{
    border-bottom-left-radius: 0.6vw;
    border-bottom-right-radius: 0.6vw;
}

.date_wrap .clock_wrap > div{
    font-size: 3.2vw;
}
.date_wrap .clock_wrap > .top span{
    transform: translateY(0.9vw);    
}
.date_wrap .clock_wrap > .bottom span{
    transform: translateY(-1.1vw);    
}

.date_wrap .clock_wrap > .top.over{
    height: calc(50% - 0.5px);
    bottom: calc(50% + 0.5px);
}
.date_wrap .clock_wrap > .top.under{
    height: calc(50% - 0.5px);
    bottom: calc(50% + 0.5px);
}
.date_wrap .clock_wrap > .bottom.over{
    height: calc(50% - 0.5px);
    top: calc(50% + 0.5px);
}
.date_wrap .clock_wrap > .bottom.under{
    height: calc(50% - 0.5px);
    top: calc(50% + 0.5px);
}

</style>
</head>
    
<body>

<div class="screen-container">
    <div class="main-content">
        
        <div class="timewrap">
            <div id="blend-layer"></div>

            <div class="date_wrap">
                <div class="clock_wrap">
                    <div class="DATE top over"><span>0/00</span></div>
                    <div class="DATE bottom over"><span>0/00</span></div>
                    <div class="DATE top under"><span>0/00</span></div>
                    <div class="DATE bottom under"><span>0/00</span></div>
                </div>
            
                <div class="clock_wrap">
                    <div class="WEEK top over"><span>SUN</span></div>

            <div class="clock_wrap double-digit">

                <div class="H0 top under"><span>00</span></div>
                <div class="H0 bottom under"><span>00</span></div>
            </div>

            <div class="separator short"></div>

            <div class="clock_wrap double-digit">
                <div class="M0 top over"><span>00</span></div>
                <div class="M0 bottom over"><span>00</span></div>
                <div class="M0 top under"><span>00</span></div>
                <div class="M0 bottom under"><span>00</span></div>
            </div>

            <div class="separator"></div>

            <div class="clock_wrap">
                <div class="S1 top over"><span>0</span></div>
                <div class="S1 bottom over"><span>0</span></div>
                <div class="S1 top under"><span>0</span></div>
                <div class="S1 bottom under"><span>0</span></div>
            </div>

            <div class="clock_wrap">
                <div class="S2 top over"><span>0</span></div>
                <div class="S2 bottom over"><span>0</span></div>
                <div class="S2 top under"><span>0</span></div>
                <div class="S2 bottom under"><span>0</span></div>
            </div>
        </div>

        <div class="weather-row-container">
            
            <div class="widget-left">
                <div id="ww_4bab25dd80486" v='1.3' loc='id' a='{"t":"responsive","lang":"ja","sl_lpl":1,"ids":["wl6910"],"font":"Arial","sl_ics":"one_a","sl_sot":"celsius","cl_bkg":"#000000","cl_font":"#FFFFFF","cl_cloud":"#FFFFFF","cl_persp":"#81D4FA","cl_sun":"#FFC107","cl_moon":"#FFC107","cl_thund":"#FF5722","cl_odd":"#FFFFFF17"}'>More forecasts: <a href="https://oneweather.org/ja/tokyo/10_days/" id="ww_4bab25dd80486_u" target="_blank">東京 天気 10日間</a></div>
                <script async src="https://app3.weatherwidget.org/js/?id=ww_4bab25dd80486"></script>
            </div>

        </div>

    </div>
</div>

<script>
    function pataTimer(){
        const d = new Date();

        let H = d.getHours();
        if(H<10) { H = '0'+H };
        const h0 = String(H).substr(0,2);
        
        let m = d.getMinutes();
        if(m<10) { m = '0'+m };
        const m0 = String(m).substr(0,2);
                
        let s = d.getSeconds();
        if(s<10) { s = '0'+s };
        const s1 = String(s).substr(0,1);
        const s2 = String(s).substr(1,1);

        const month = d.getMonth()+1;
        const date = d.getDate();
        const dateStr = month + '/' + date;
        const dayOfWeekStr = [ "SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT" ][d.getDay()];

        const prevDATE = document.getElementsByClassName('DATE top under')[0].children[0].innerHTML;
        const prevWEEK = document.getElementsByClassName('WEEK top under')[0].children[0].innerHTML;
        if(dateStr != prevDATE){
            pataMotion('DATE', dateStr);
        }
        if(dayOfWeekStr != prevWEEK){
            pataMotion('WEEK', dayOfWeekStr);
        }

        const prevH0 = document.getElementsByClassName('H0 top under')[0].children[0].innerHTML;
        if(h0 != prevH0){
            pataMotion('H0', h0);
        }

        const prevM0 = document.getElementsByClassName('M0 top under')[0].children[0].innerHTML;
        if(m0 != prevM0){
            pataMotion('M0', m0);
        }

        const prevS1 = document.getElementsByClassName('S1 top under')[0].children[0].innerHTML;
        const prevS2 = document.getElementsByClassName('S2 top under')[0].children[0].innerHTML;
        if(s1 != prevS1){
            pataMotion('S1', s1);
        }
        if(s2 != prevS2){
            pataMotion('S2', s2);
        }
    }

    function pataMotion(_objClass, _txt){
            document.getElementsByClassName( _objClass + ' top under')[0].children[0].innerHTML = _txt;
            document.getElementsByClassName( _objClass + ' bottom over')[0].children[0].innerHTML = _txt;
            
            const topOvElem = document.getElementsByClassName( _objClass + ' top over')[0];
            topOvElem.classList.add('motion_top');
            topOvElem.addEventListener('animationend', function(e){
                const topUnderElem =  document.getElementsByClassName( _objClass + ' top under')[0];
                this.children[0].innerHTML = topUnderElem.children[0].innerHTML;
                topUnderElem.classList.remove('under');
                topUnderElem.classList.add('over');
                this.classList.remove('over');
                this.classList.add('under');
                this.classList.remove('motion_top');

                e.currentTarget.removeEventListener('animationend', arguments.callee, false);
            });

            const bottomOvElem  = document.getElementsByClassName( _objClass + ' bottom over')[0];
            bottomOvElem.classList.add('motion_bottom');
            document.getElementsByClassName( _objClass + ' bottom under')[0].classList.add('shadow');
            bottomOvElem.addEventListener('animationend', function(e){
                const bottomUnderElem =  document.getElementsByClassName( _objClass + ' bottom under')[0];
                bottomUnderElem.children[0].innerHTML = this.children[0].innerHTML;
                bottomUnderElem.classList.remove('under');
                bottomUnderElem.classList.add('over');
                bottomUnderElem.classList.remove('shadow');
                this.classList.remove('over');
                this.classList.add('under');
                this.classList.remove('motion_bottom');

                e.currentTarget.removeEventListener('animationend', arguments.callee, false);
            });
    }

    function initialTimer(){
        let s = new Date().getSeconds();
        if(s%10 == 0){
            clearInterval(timer01);
            clearInterval(timer02);
            setInterval(pataTimer, 1000)
        }
    }
    const timer01 = setInterval(pataTimer, 1000);
    const timer02 = setInterval(initialTimer, 1000);

    // ───【追加】天気ウィジェットを10分ごとに更新するロジック ───
    setInterval(function() {
        const widgetContainer = document.querySelector('.widget-left');
        if (widgetContainer) {
            const originalDiv = document.getElementById('ww_4bab25dd80486');
            if (originalDiv) {
                widgetContainer.innerHTML = '';
                
                const newDiv = originalDiv.cloneNode(true);
                widgetContainer.appendChild(newDiv);
                
                const newScript = document.createElement('script');
                newScript.async = true;
                newScript.src = "https://app3.weatherwidget.org/js/?id=ww_4bab25dd80486";
                widgetContainer.appendChild(newScript);
            }
        }
    }, 10 * 60 * 1000);
</script>
